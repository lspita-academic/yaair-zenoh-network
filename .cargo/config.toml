include = [
    { path = "config.local.toml", optional = true }
]

[build]
target = "riscv32imc-esp-espidf"

# https://github.com/esp-rs/esp-idf-sys/blob/master/BUILD-OPTIONS.md#rust-configuration-flags
[target.riscv32imc-esp-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"
rustflags = ["--cfg", "espidf_time64"]

[unstable]
build-std = ["std", "panic_abort"]

[env]
CARGO_WORKSPACE_DIR = { value = "", relative = true }
ESP_IDF_SYS_ROOT_CRATE = "esp-idf-config"
ESP_IDF_SDKCONFIG_DEFAULTS = { value = "sdkconfig.defaults", relative = true }
ZENOH_PICO_FRAG_MAX_SIZE = "4096"
ZENOH_PICO_BATCH_UNICAST_SIZE = "2048"
ZENOH_PICO_BATCH_MULTICAST_SIZE = "2048"
